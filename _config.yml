# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
title                    : "Sijin Wang (王思进)"
description              : "Focusing on graph algorithms, graph query processing, and network dismantling."
repository               : "Cogitara/Cogitara.github.io"   # 保留原仓库地址，您可按需修改
google_scholar_stats_use_cdn : true

# google analytics
google_analytics_id      :

# SEO Related
google_site_verification : 
bing_site_verification   : 
baidu_site_verification  : 

# Site Author
author:
  name             : "Sijin Wang"
  # avatar         : "images/ry_profile.jpeg"   # 无头像信息，已注释
  bio              : "Master student at Cyberspace Institute of Advanced Technology, Guangzhou University. Interested in graph algorithms, cache-centric data structures, and network dismantling."
  location         : "Guangzhou, P.R. China"
  employer         : "Cyberspace Institute of Advanced Technology, Guangzhou University"
  email            : "wsjin@e.gzhu.edu.cn"
  # 以下社交媒体字段因简历中未提供，已移除或注释
  # googlescholar   : 
  # linkedin        :
  # github          :
  # dblp            :
  orcid           : https://orcid.org/my-orcid?orcid=0009-0007-1637-9405

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
  - google_scholar_crawler
  - github_myprofile_updater
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
